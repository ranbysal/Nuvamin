<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — Nuvamin</title>
<meta name="description" content="Your Nuvamin cart.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000000'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Arial' font-size='17' fill='%23FFFFFF'%3EN%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="cart">

<header class="site-header"></header>

<section class="page-hero">
  <div class="wrap">
    <p class="kicker">Your order</p>
    <h1 class="h-display h-xl">Cart</h1>
  </div>
</section>

<section class="section" style="padding-top:0">
  <div class="wrap" id="cart-root"></div>
</section>

<footer class="site-footer"></footer>

<script src="assets/js/products.js"></script>
<script src="assets/js/main.js"></script>
<script>
  (function () {
    var root = document.getElementById("cart-root");
    var FREE_SHIP = 60, SHIP = 6;

    function render() {
      var cart = nvCart.read();
      var ids = Object.keys(cart).filter(function (id) { return nvFindProduct(id); });

      if (!ids.length) {
        root.innerHTML =
          '<div class="cart-empty">' +
          "<p>Your cart is empty &mdash; a state of great potential.</p>" +
          '<a class="btn" href="shop.html">Browse the range <span class="arr">&rarr;</span></a>' +
          "</div>";
        return;
      }

      var subtotal = 0;
      var lines = ids.map(function (id) {
        var p = nvFindProduct(id), q = cart[id];
        subtotal += p.price * q;
        return (
          '<div class="cart-line">' +
          '<a class="cart-thumb" href="product.html?id=' + p.id + '">' + nvProductImg(p) + "</a>" +
          "<div><h3>" + p.name + '</h3><p class="sub">' + p.sub + " &middot; " + p.form + '</p>' +
          '<button class="remove" data-remove="' + p.id + '">Remove</button></div>' +
          '<div class="qty"><button data-dec="' + p.id + '" aria-label="Decrease">&minus;</button><output>' + q + '</output><button data-inc="' + p.id + '" aria-label="Increase">+</button></div>' +
          '<span class="cart-line-price">&euro;' + p.price * q + "</span>" +
          "</div>"
        );
      }).join("");

      var shipping = subtotal >= FREE_SHIP ? 0 : SHIP;
      var shipLabel = shipping === 0 ? "Free" : "&euro;" + shipping;
      var toFree = subtotal >= FREE_SHIP
        ? "You have free shipping."
        : "&euro;" + (FREE_SHIP - subtotal) + " away from free shipping.";

      root.innerHTML =
        '<div class="cart-layout">' +
        '<div class="cart-lines">' + lines + "</div>" +
        '<aside class="cart-summary"><h2>Summary</h2>' +
        '<div class="sum-row"><span>Subtotal</span><span>&euro;' + subtotal + "</span></div>" +
        '<div class="sum-row"><span>Shipping</span><span>' + shipLabel + "</span></div>" +
        '<div class="sum-row"><span style="font-family:var(--serif);font-style:italic">' + toFree + "</span></div>" +
        '<div class="sum-row total"><span>Total</span><span>&euro;' + (subtotal + shipping) + "</span></div>" +
        '<label class="co-label" for="co-email">Email for receipt</label>' +
        '<input class="co-email" id="co-email" type="email" placeholder="you@lab.org" autocomplete="email">' +
        '<button class="btn" id="checkout">Checkout <span class="arr">&rarr;</span></button>' +
        '<p style="margin-top:16px;font-size:11.5px;color:var(--ink-40)">Secure hosted payment. Card details are entered on the gateway&rsquo;s PCI-compliant page &mdash; Nuvamin never sees or stores them. Certificate of analysis included.</p>' +
        "</aside></div>";
      var saved = sessionStorage.getItem("nuvamin-email");
      if (saved) { var f = document.getElementById("co-email"); if (f) f.value = saved; }
    }

    var busy = false;
    async function checkout() {
      if (busy) return;
      var cart = nvCart.read();
      if (!Object.keys(cart).length) { nvToast("Your cart is empty"); return; }
      var emailEl = document.getElementById("co-email");
      var emailv = emailEl ? emailEl.value.trim() : "";
      if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(emailv)) {
        nvToast("Enter a valid email for your receipt");
        if (emailEl) emailEl.focus();
        return;
      }
      sessionStorage.setItem("nuvamin-email", emailv);
      busy = true;
      var btn = document.getElementById("checkout");
      if (btn) { btn.textContent = "Redirecting…"; btn.disabled = true; }
      try {
        var apiBase = window.NUVAMIN_API_BASE || "";
        var res = await fetch(apiBase + "/api/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cart: cart, customer: { email: emailv } })
        });
        var data = await res.json().catch(function () { return {}; });
        if (res.ok && data.redirectUrl) {
          window.location.href = data.redirectUrl; // -> hosted gateway page
          return;
        }
        nvToast(data.error || "Checkout is unavailable right now");
      } catch (err) {
        nvToast("Checkout needs the server running (npm start)");
      }
      busy = false;
      if (btn) { btn.innerHTML = 'Checkout <span class="arr">&rarr;</span>'; btn.disabled = false; }
    }

    root.addEventListener("click", function (e) {
      var t = e.target;
      var cart = nvCart.read();
      if (t.hasAttribute("data-remove")) { nvCart.set(t.getAttribute("data-remove"), 0); render(); }
      else if (t.hasAttribute("data-inc")) { var a = t.getAttribute("data-inc"); nvCart.set(a, (cart[a] || 0) + 1); render(); }
      else if (t.hasAttribute("data-dec")) { var b = t.getAttribute("data-dec"); nvCart.set(b, (cart[b] || 0) - 1); render(); }
      else if (t.closest && t.closest("#checkout")) { e.preventDefault(); checkout(); }
    });

    render();
  })();
</script>
</body>
</html>
