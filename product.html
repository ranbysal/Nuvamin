<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound — Nuvamin</title>
<meta name="description" content="Nuvamin research compound — full analytical specification, certificate of analysis, and handling guidance. Research use only.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Nuvamin">
<meta property="og:title" content="Compound — Nuvamin">
<meta property="og:description" content="Nuvamin research compound — full analytical specification, certificate of analysis, and handling guidance. Research use only.">
<meta property="og:image" content="https://nuvamin.vercel.app/assets/img/retatrutide.webp">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000000'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Arial' font-size='17' fill='%23FFFFFF'%3EN%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="shop">

<header class="site-header"></header>

<section class="pdp" id="pdp"></section>

<section class="section related">
  <div class="wrap">
    <div class="section-head reveal">
      <div>
        <p class="kicker">Related compounds</p>
        <h2 class="h-display h-md">Explore the catalogue</h2>
      </div>
      <a class="section-link" href="shop.html">View all</a>
    </div>
    <div class="pgrid cols-3" id="related-grid"></div>
  </div>
</section>

<footer class="site-footer"></footer>

<script src="assets/js/products.js"></script>
<script src="assets/js/main.js"></script>
<script>
  (function () {
    var params = new URLSearchParams(location.search);
    var requestedId = params.get("id");
    // No id → default to the flagship compound; an id that doesn't exist →
    // back to the catalogue rather than a half-broken page.
    var p = requestedId ? nvFindProduct(requestedId) : NV_PRODUCTS[0];
    if (!p) { location.replace("shop.html"); return; }
    document.title = p.name + " " + p.mg + " — Nuvamin";

    var qty = 1;

    var specRows = p.specs.map(function (s) {
      return "<tr><td>" + s.k + "</td><td>" + s.v + "</td></tr>";
    }).join("");

    var research = p.research.map(function (b) { return "<li>" + b + "</li>"; }).join("");

    document.getElementById("pdp").innerHTML =
      '<div class="pdp-media-col" style="background:' + p.panel + '"><div class="pdp-media">' + nvProductImg(p) + "</div></div>" +
      '<div class="pdp-info">' +
      '<p class="pdp-cat">' + p.category + " &mdash; " + p.mg + " &middot; " + p.form + "</p>" +
      '<h1 class="h-display pdp-title">' + p.name + "</h1>" +
      '<p class="pdp-sub">' + p.sub + "</p>" +
      '<p class="pdp-price">$' + p.price.toFixed(2) + '</p>' +
      '<p class="pdp-form">' + p.mg + " per vial &middot; " + p.form + "</p>" +
      '<p class="pdp-blurb">' + p.blurb + "</p>" +
      '<p class="pdp-context">Research application</p>' +
      '<ul class="pdp-benefits">' + research + "</ul>" +
      '<div class="pdp-buy">' +
      '<div class="qty"><button type="button" data-q="-1" aria-label="Decrease quantity">&minus;</button><output id="qty-out">1</output><button type="button" data-q="1" aria-label="Increase quantity">+</button></div>' +
      '<button class="btn" id="pdp-add">Add to cart &mdash; $<span id="pdp-total">' + p.price.toFixed(2) + "</span></button>" +
      "</div>" +
      '<p class="pdp-ship"><span>Free shipping over $60</span><span>Cold-chain dispatch</span><span>CoA included</span><span>Lot lookup online</span></p>' +
      '<p class="pdp-ruo">For laboratory research use only. Not for human or veterinary use.</p>' +
      '<div class="acc">' +
      '<div class="acc-item"><button class="acc-btn" aria-expanded="false">Analytical specification <span class="acc-x">+</span></button><div class="acc-panel"><div class="acc-body"><table>' + specRows + "</table></div></div></div>" +
      '<div class="acc-item"><button class="acc-btn" aria-expanded="false">Certificate of analysis <span class="acc-x">+</span></button><div class="acc-panel"><div class="acc-body"><p>Each lot of ' + p.name + " ships with a certificate of analysis confirming identity by mass spectrometry and purity by HPLC, alongside net-content, endotoxin and bioburden results. Every certificate is archived online for five years and is searchable by lot number printed on the vial.</p></div></div></div>" +
      '<div class="acc-item"><button class="acc-btn" aria-expanded="false">Handling &amp; reconstitution <span class="acc-x">+</span></button><div class="acc-panel"><div class="acc-body"><p>Supplied lyophilised. Store sealed at &minus;20&nbsp;&deg;C, desiccated and protected from light. Allow the vial to reach room temperature before opening to avoid condensation. Reconstitution volumes and buffers depend on your study design &mdash; handling is the responsibility of the qualified researcher.</p></div></div></div>' +
      '<div class="acc-item"><button class="acc-btn" aria-expanded="false">Shipping &amp; cold chain <span class="acc-x">+</span></button><div class="acc-panel"><div class="acc-body"><p>Dispatched within 24 hours on business days, packed on dry ice or gel packs as stability requires. Tracked cold-chain courier across the EU and worldwide. Because these are temperature-sensitive research materials, sales are final; damaged or non-conforming shipments are replaced on receipt of photos and the lot number.</p></div></div></div>' +
      "</div></div>";

    function syncQty() {
      document.getElementById("qty-out").textContent = qty;
      document.getElementById("pdp-total").textContent = (p.price * qty).toFixed(2);
    }
    document.querySelectorAll("[data-q]").forEach(function (b) {
      b.addEventListener("click", function () {
        qty = Math.max(1, qty + parseInt(b.getAttribute("data-q"), 10));
        syncQty();
      });
    });
    document.getElementById("pdp-add").addEventListener("click", function () {
      nvCart.add(p.id, qty);
    });

    var related = NV_PRODUCTS.filter(function (x) { return x.id !== p.id; })
      .sort(function (a, b) {
        return (b.category === p.category) - (a.category === p.category);
      })
      .slice(0, 3);
    document.getElementById("related-grid").innerHTML =
      related.map(function (x, i) { return nvProductCard(x, i); }).join("");
    nvWatchReveals();
  })();
</script>
</body>
</html>
